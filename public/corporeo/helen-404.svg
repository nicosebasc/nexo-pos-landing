<svg class="character-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" aria-label="Cajero hipster en punto de venta">
        <defs>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&amp;display=swap');
            @keyframes float {
              0%,100%{transform:translateY(0)}
              50%{transform:translateY(-8px)}
            }
            @keyframes wave {
              0%,100%{transform:rotate(-15deg)}
              50%{transform:rotate(15deg)}
            }
            @keyframes bubble-pulse {
              0%,100%{transform:scale(1);opacity:1}
              50%{transform:scale(1.07);opacity:.95}
            }
            @keyframes blink {
              0%,88%,100%{transform:scaleY(1)}
              94%{transform:scaleY(0.08)}
            }
            @keyframes screen-glow {
              0%,100%{opacity:.82}
              50%{opacity:1}
            }
            @keyframes receipt-feed {
              0%,100%{transform:translateY(0)}
              40%{transform:translateY(-6px)}
              60%{transform:translateY(-6px)}
            }
            @keyframes bun-bounce {
              0%,100%{transform:rotate(0deg) scale(1)}
              50%{transform:rotate(-6deg) scale(1.04)}
            }
            #char-float { animation: float 3s ease-in-out infinite; }
            #arm-right  { transform-box:fill-box; transform-origin:bottom left;  animation: wave .65s ease-in-out infinite alternate; }
            #speech-bubble { transform-box:fill-box; transform-origin:bottom left; animation: bubble-pulse 2s ease-in-out infinite; }
            #eye-left   { transform-box:fill-box; transform-origin:center; animation: blink 4s ease-in-out infinite; }
            #terminal-screen { animation: screen-glow 1.4s ease-in-out infinite; }
            #receipt-strip   { transform-box:fill-box; transform-origin:bottom center; animation: receipt-feed 3s ease-in-out infinite; }
            #bun-left   { transform-box:fill-box; transform-origin:center bottom; animation: bun-bounce 2.2s ease-in-out infinite; }
            #bun-right  { transform-box:fill-box; transform-origin:center bottom; animation: bun-bounce 2.2s ease-in-out infinite .4s; }
          </style>
          <!-- Hair gradient: pink → peach → orange -->
          <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ff7fa8"></stop>
            <stop offset="0.55" stop-color="#ff9d6e"></stop>
            <stop offset="1" stop-color="#ff6f4d"></stop>
          </linearGradient>
          <linearGradient id="bunGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffa6c2"></stop>
            <stop offset="1" stop-color="#ff6f8e"></stop>
          </linearGradient>
          <radialGradient id="faceGrad" cx="0.5" cy="0.45" r="0.65">
            <stop offset="0" stop-color="#fff3e9"></stop>
            <stop offset="1" stop-color="#fbd9c2"></stop>
          </radialGradient>
          <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#6a4af0"></stop>
            <stop offset="1" stop-color="#3a18c4"></stop>
          </linearGradient>
          <linearGradient id="apronGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#5731f5"></stop>
            <stop offset="1" stop-color="#2c0fa3"></stop>
          </linearGradient>
          <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#34d4a4"></stop>
            <stop offset="1" stop-color="#0b8a64"></stop>
          </linearGradient>
          <linearGradient id="counterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"></stop>
            <stop offset="1" stop-color="#e3def7"></stop>
          </linearGradient>
          <linearGradient id="terminalGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2a2a45"></stop>
            <stop offset="1" stop-color="#0f0f1e"></stop>
          </linearGradient>
          <radialGradient id="cheekGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#ff8aa6" stop-opacity="0.9"></stop>
            <stop offset="1" stop-color="#ff8aa6" stop-opacity="0"></stop>
          </radialGradient>
        </defs>

        <!-- Floor / counter -->
        <ellipse cx="300" cy="540" rx="260" ry="20" fill="#000" opacity="0.10"></ellipse>
        <rect x="60" y="430" width="480" height="120" rx="14" fill="url(#counterGrad)"></rect>
        <rect x="60" y="430" width="480" height="10" fill="#c8bdf3"></rect>

        <!-- Receipt printer / Terminal POS to the LEFT side of counter -->
        <g transform="translate(90,360)">
          <rect x="0" y="0" width="110" height="80" rx="10" fill="url(#terminalGrad)"></rect>
          <rect id="terminal-screen" x="10" y="10" width="90" height="40" rx="4" fill="#10b981"></rect>
          <rect x="14" y="14" width="82" height="6" rx="2" fill="#0c8c63"></rect>
          <rect x="14" y="24" width="55" height="4" rx="2" fill="#0c8c63" opacity="0.7"></rect>
          <rect x="14" y="32" width="68" height="4" rx="2" fill="#0c8c63" opacity="0.7"></rect>
          <!-- Keypad -->
          <g fill="#4a4a6b">
            <rect x="14" y="56" width="14" height="8" rx="2"></rect>
            <rect x="32" y="56" width="14" height="8" rx="2"></rect>
            <rect x="50" y="56" width="14" height="8" rx="2"></rect>
            <rect x="68" y="56" width="14" height="8" rx="2"></rect>
            <rect x="86" y="56" width="10" height="8" rx="2"></rect>
          </g>
          <rect x="14" y="68" width="82" height="6" rx="2" fill="#4723d9"></rect>
          <!-- Receipt strip (animated) -->
          <g id="receipt-strip">
            <path d="M 50 -34 L 50 0 L 80 0 L 80 -34 L 76 -36 L 72 -32 L 68 -36 L 64 -32 L 60 -36 L 56 -32 L 54 -36 Z" fill="#fff" stroke="#c8bdf3" stroke-width="1"></path>
            <line x1="55" y1="-28" x2="75" y2="-28" stroke="#c8bdf3" stroke-width="1.5"></line>
            <line x1="55" y1="-22" x2="75" y2="-22" stroke="#c8bdf3" stroke-width="1.5"></line>
            <line x1="55" y1="-16" x2="70" y2="-16" stroke="#c8bdf3" stroke-width="1.5"></line>
            <line x1="55" y1="-10" x2="75" y2="-10" stroke="#4723d9" stroke-width="2"></line>
          </g>
        </g>

        <!-- Character body group -->
        <g transform="translate(0,-10)">
          <g id="char-float">

          <!-- Back of hair (long flowing) -->
          <path d="M 175 200
                   C 130 230, 120 320, 145 410
                   C 155 430, 175 440, 195 430
                   L 200 350
                   C 210 280, 230 240, 250 215 Z" fill="url(#hairGrad)"></path>
          <path d="M 425 200
                   C 470 230, 480 320, 455 410
                   C 445 430, 425 440, 405 430
                   L 400 350
                   C 390 280, 370 240, 350 215 Z" fill="url(#hairGrad)"></path>

          <!-- Torso / shirt -->
          <path d="M 200 410
                   C 195 380, 220 360, 240 355
                   L 360 355
                   C 380 360, 405 380, 400 410
                   L 410 470
                   C 410 490, 395 500, 380 500
                   L 220 500
                   C 205 500, 190 490, 190 470 Z" fill="url(#shirtGrad)"></path>
          <!-- Shirt collar / V -->
          <path d="M 270 355 L 300 390 L 330 355 Z" fill="#3a18c4"></path>
          <!-- Apron -->
          <path d="M 240 380
                   C 250 372, 280 370, 300 370
                   C 320 370, 350 372, 360 380
                   L 365 480
                   C 365 495, 350 500, 335 500
                   L 265 500
                   C 250 500, 235 495, 235 480 Z" fill="url(#apronGrad)" opacity="0.92"></path>
          <!-- Apron pocket -->
          <rect x="262" y="430" width="76" height="40" rx="6" fill="#2c0fa3" opacity="0.7"></rect>
          <line x1="300" y1="430" x2="300" y2="470" stroke="#1a056b" stroke-width="2" opacity="0.6"></line>
          <!-- Apron strap -->
          <path d="M 260 380 L 250 350" stroke="#2c0fa3" stroke-width="6" stroke-linecap="round"></path>
          <path d="M 340 380 L 350 350" stroke="#2c0fa3" stroke-width="6" stroke-linecap="round"></path>
          <!-- Logo badge on apron -->
          <circle cx="300" cy="410" r="14" fill="#ffffff"></circle>
          <text x="300" y="415" text-anchor="middle" font-family="Poppins" font-weight="800" font-size="14" fill="#4723d9">P</text>

          <!-- Neck -->
          <rect x="282" y="335" width="36" height="28" rx="6" fill="#fbd9c2"></rect>

          <!-- Head -->
          <ellipse cx="300" cy="260" rx="115" ry="120" fill="url(#faceGrad)"></ellipse>

          <!-- Hair front bangs -->
          <path d="M 185 230
                   C 185 170, 230 130, 300 130
                   C 370 130, 415 170, 415 230
                   C 415 250, 410 260, 400 260
                   C 385 250, 365 248, 345 258
                   C 330 252, 315 252, 300 260
                   C 285 252, 270 252, 255 258
                   C 235 248, 215 250, 200 260
                   C 190 260, 185 250, 185 230 Z" fill="url(#hairGrad)"></path>

          <!-- Side bangs (long sweeping) -->
          <path d="M 188 230 C 175 270, 175 320, 195 360 C 205 365, 215 360, 218 350 L 230 280 C 220 250, 205 235, 188 230 Z" fill="url(#hairGrad)"></path>
          <path d="M 412 230 C 425 270, 425 320, 405 360 C 395 365, 385 360, 382 350 L 370 280 C 380 250, 395 235, 412 230 Z" fill="url(#hairGrad)"></path>

          <!-- Top buns (chignon style, animated) -->
          <g id="bun-left">
            <ellipse cx="245" cy="130" rx="32" ry="34" fill="url(#bunGrad)"></ellipse>
            <ellipse cx="238" cy="120" rx="10" ry="6" fill="#ffd0de" opacity="0.7"></ellipse>
            <ellipse cx="245" cy="160" rx="22" ry="6" fill="#0ea5e9"></ellipse>
            <ellipse cx="245" cy="160" rx="22" ry="3" fill="#38bdf8"></ellipse>
          </g>
          <g id="bun-right">
            <ellipse cx="345" cy="135" rx="26" ry="28" fill="url(#bunGrad)"></ellipse>
            <ellipse cx="340" cy="126" rx="8" ry="5" fill="#ffd0de" opacity="0.7"></ellipse>
            <ellipse cx="345" cy="160" rx="18" ry="5" fill="#0ea5e9"></ellipse>
          </g>

          <!-- Hipster glasses (thick black round frames) -->
          <g stroke="#1a1a2e" stroke-width="6" fill="none" stroke-linecap="round">
            <!-- Bridge -->
            <path d="M 285 268 L 315 268"></path>
            <!-- Temple arms going into hair -->
            <path d="M 220 270 L 195 262"></path>
            <path d="M 380 270 L 405 262"></path>
          </g>
          <!-- Lens fills (slight tint) -->
          <circle cx="255" cy="270" r="34" fill="#ffffff" opacity="0.3"></circle>
          <circle cx="345" cy="270" r="34" fill="#ffffff" opacity="0.3"></circle>
          <!-- Lens frames -->
          <circle cx="255" cy="270" r="34" fill="none" stroke="#1a1a2e" stroke-width="6"></circle>
          <circle cx="345" cy="270" r="34" fill="none" stroke="#1a1a2e" stroke-width="6"></circle>

          <!-- Eyes (behind glasses) -->
          <!-- Left eye: open with sparkle (animated blink) -->
          <g id="eye-left">
            <ellipse cx="255" cy="272" rx="11" ry="14" fill="#1a1a2e"></ellipse>
            <circle cx="259" cy="268" r="4" fill="#ffffff"></circle>
            <circle cx="252" cy="276" r="2" fill="#ffffff"></circle>
          </g>
          <!-- Right eye: winking arc -->
          <path d="M 332 274 Q 345 264, 358 274" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"></path>

          <!-- Cheeks blush -->
          <ellipse cx="220" cy="305" rx="16" ry="10" fill="url(#cheekGrad)"></ellipse>
          <ellipse cx="380" cy="305" rx="16" ry="10" fill="url(#cheekGrad)"></ellipse>

          <!-- Mouth -->
          <path d="M 282 325 Q 300 345, 318 325" stroke="#a04566" stroke-width="4" fill="#ffb0c4" stroke-linecap="round"></path>

          <!-- Eyebrows -->
          <path d="M 235 240 Q 255 232, 275 240" stroke="#c44a76" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <path d="M 325 240 Q 345 232, 365 240" stroke="#c44a76" stroke-width="4" fill="none" stroke-linecap="round"></path>

          <!-- Lanyard (employee badge) -->
          <path d="M 280 360 L 270 410 L 260 460 L 252 480" stroke="#0ea5e9" stroke-width="4" fill="none"></path>
          <path d="M 320 360 L 330 410 L 340 460 L 348 480" stroke="#0ea5e9" stroke-width="4" fill="none"></path>
          <rect x="252" y="478" width="96" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"></rect>
          <rect x="258" y="484" width="84" height="6" rx="2" fill="#4723d9"></rect>
          <rect x="258" y="496" width="60" height="4" rx="2" fill="#cbd5e1"></rect>
          <rect x="258" y="504" width="48" height="4" rx="2" fill="#cbd5e1"></rect>

          <!-- Right arm waving up (Hola!) — animated -->
          <g id="arm-right">
            <path d="M 405 380
                     C 440 360, 470 320, 478 270
                     C 480 250, 470 240, 460 245
                     C 450 250, 442 280, 430 305
                     C 425 315, 420 325, 415 330 Z" fill="#fbd9c2"></path>
            <path d="M 405 380
                     C 440 360, 470 320, 478 270" stroke="#f4cdb4" stroke-width="2" fill="none" opacity="0.6"></path>
            <!-- Hand / fingers cluster -->
            <circle cx="470" cy="245" r="22" fill="#fde6d6"></circle>
            <path d="M 460 230 q 4 -10 12 -8 q 4 1 4 9 l -2 14" fill="#fde6d6" stroke="#f4cdb4" stroke-width="1"></path>
            <path d="M 472 226 q 4 -12 12 -10 q 4 1 4 9 l -2 18" fill="#fde6d6" stroke="#f4cdb4" stroke-width="1"></path>
            <path d="M 484 232 q 4 -8 10 -6 q 3 1 3 7 l -2 12" fill="#fde6d6" stroke="#f4cdb4" stroke-width="1"></path>
          </g>

          <!-- Left arm reaching to POS terminal -->
          <g>
            <path d="M 200 400
                     C 175 410, 160 415, 150 410
                     C 140 405, 130 395, 135 385
                     L 165 380
                     C 180 378, 195 380, 205 385 Z" fill="#fbd9c2"></path>
            <ellipse cx="148" cy="400" rx="20" ry="16" fill="#fde6d6"></ellipse>
          </g>

          </g><!-- end #char-float -->
        </g>


      </svg>
